<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G3 AudCon — Plataforma de Cursos, Treinamentos e Certificação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,600&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.0.3/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy-deep:#0A1650;
    --navy-mid:#152A7A;
    --navy-bright:#22389C;
    --copper-dark:#9F6444;
    --copper-mid:#C0854A;
    --copper-light:#D8A469;
    --paper:#F7F4EE;
    --paper-line:#E7E0D2;
    --ink:#1B1F2E;
    --ink-soft:#5B6178;
    --ok:#3B7A57;
    --danger:#A8402F;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Sans 3', system-ui, sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,h4,.display{
    font-family:'Poppins', sans-serif;
    letter-spacing:-.01em;
    font-weight:700;
    color:var(--navy-deep);
  }
  .mono{font-family:'IBM Plex Mono', monospace; letter-spacing:.03em;}
  a{color:var(--navy-bright);}
  button{font-family:inherit; cursor:pointer;}
  .app{min-height:100vh; display:flex; flex-direction:column;}

  /* ---------- Header ---------- */
  header.topbar{
    background:linear-gradient(115deg,var(--navy-deep) 0%,var(--navy-mid) 55%,var(--navy-deep) 100%);
    color:#fff;
    padding:0;
    border-bottom:1px solid rgba(216,164,105,.35);
    box-shadow:0 6px 24px rgba(6,10,40,.28);
    position:sticky; top:0; z-index:40;
  }
  .topbar-inner{
    max-width:1200px; margin:0 auto; padding:16px 28px;
    display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:13px;}
  .brand-mark{
    width:48px;height:48px;border-radius:9px;
    object-fit:contain; display:block;
    box-shadow:0 0 0 1px rgba(216,164,105,.4);
    background:var(--navy-deep);
  }
  .brand-text .name{font-family:'Poppins',sans-serif; font-weight:700; font-size:20px; letter-spacing:.09em; line-height:1;}
  .brand-text .tag{font-size:10px; letter-spacing:.2em; color:var(--copper-light); text-transform:uppercase; margin-top:4px; font-family:'IBM Plex Mono',monospace;}
  nav.mainnav{display:flex; align-items:center; gap:4px; flex-wrap:wrap;}
  nav.mainnav button{
    background:transparent; border:1px solid transparent; color:rgba(255,255,255,.82);
    padding:9px 16px; border-radius:2px; font-size:12.5px; letter-spacing:.07em; text-transform:uppercase;
    font-family:'Poppins',sans-serif; font-weight:600;
    transition:.15s;
  }
  nav.mainnav button:hover{color:#fff; border-color:rgba(216,164,105,.4);}
  nav.mainnav button.active{background:var(--copper-mid); border-color:var(--copper-mid); color:var(--navy-deep);}

  main{flex:1; max-width:1200px; margin:0 auto; padding:0 28px 64px; width:100%;}

  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--copper-dark); margin:0 0 8px; font-weight:600;
  }
  .page-title{font-size:36px; margin:0 0 8px; letter-spacing:.015em;}
  .page-sub{color:var(--ink-soft); font-size:15px; max-width:660px; margin:0 0 30px; line-height:1.6;}

  /* ---------- Hero institucional ---------- */
  .hero{
    background:
      radial-gradient(circle at 15% 0%, rgba(216,164,105,.16), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(53,73,184,.55), transparent 55%),
      linear-gradient(135deg, var(--navy-deep) 0%, var(--navy-mid) 65%, var(--navy-bright) 100%);
    margin:0 -28px 40px; padding:56px 28px 44px;
    color:#fff; position:relative; overflow:hidden;
    border-bottom:1px solid rgba(216,164,105,.35);
  }
  .hero-inner{max-width:1200px; margin:0 auto; position:relative; z-index:2;}
  .hero .eyebrow{color:var(--copper-light);}
  .hero h1{
    color:#fff; font-size:44px; max-width:760px; margin:0 0 14px; line-height:1.08; letter-spacing:.01em;
  }
  .hero h1 .accent{color:var(--copper-light);}
  .hero p.sub{color:rgba(255,255,255,.78); font-size:15.5px; max-width:600px; line-height:1.65; margin:0 0 30px;}
  .hero-stats{display:flex; gap:36px; flex-wrap:wrap; border-top:1px solid rgba(255,255,255,.16); padding-top:22px; margin-top:8px;}
  .hero-stats .stat b{
    display:block; font-family:'Poppins',sans-serif; font-weight:800; font-size:30px; color:var(--copper-light); line-height:1;
  }
  .hero-stats .stat span{font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.68); display:block; margin-top:5px;}
  .hero-tagline{
    font-family:'Poppins', sans-serif; font-style:italic; font-size:19px; color:rgba(255,255,255,.85);
    margin:22px 0 0; border-left:2px solid var(--copper-mid); padding-left:14px;
  }

  /* ---------- Cards ---------- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(288px,1fr)); gap:22px;}
  .card{
    background:#fff; border:1px solid var(--paper-line); border-radius:var(--radius);
    padding:24px 22px 20px; display:flex; flex-direction:column; gap:10px;
    position:relative; transition:.18s;
  }
  .card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--navy-deep); transition:.18s;
  }
  .card:hover{box-shadow:0 10px 28px rgba(10,22,80,.11); transform:translateY(-3px); border-color:#DDD5C2;}
  .card:hover::before{background:var(--copper-mid); width:4px;}
  .card .cardhead{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .card .idx{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--paper-line); font-weight:600;}
  .card .cat{font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--copper-dark); font-weight:600;}
  .card h3{font-size:22px; margin:2px 0 4px; line-height:1.15;}
  .card p{font-size:13.5px; color:var(--ink-soft); line-height:1.55; margin:0; flex:1;}
  .card .meta{display:flex; gap:14px; font-size:12px; color:var(--ink-soft); border-top:1px solid var(--paper-line); padding-top:12px; margin-top:6px;}
  .badge{
    display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:3px 9px; border-radius:20px;
    background:var(--navy-deep); color:#fff; letter-spacing:.04em; text-transform:uppercase; font-weight:600;
  }
  .badge.video{background:var(--navy-bright);}
  .badge.pdf{background:var(--copper-dark);}
  .badge.document{background:var(--ink-soft);}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    background:var(--navy-deep); color:#fff; border:1px solid var(--navy-deep); padding:11px 20px; border-radius:2px;
    font-family:'Poppins',sans-serif; font-weight:700; font-size:13.5px; letter-spacing:.06em; text-transform:uppercase;
    transition:.15s;
  }
  .btn:hover{background:var(--navy-bright); border-color:var(--navy-bright);}
  .btn.copper{background:var(--copper-mid); color:#fff; border-color:var(--copper-mid);}
  .btn.copper:hover{background:var(--copper-dark); border-color:var(--copper-dark);}
  .btn.ghost{background:transparent; color:var(--navy-deep); border:1px solid var(--navy-deep);}
  .btn.ghost:hover{background:var(--navy-deep); color:#fff;}
  .btn.danger{background:var(--danger); color:#fff; border-color:var(--danger);}
  .btn.small{padding:6px 13px; font-size:11.5px;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}

  /* ---------- Forms ---------- */
  .panel{background:#fff; border:1px solid var(--paper-line); border-radius:var(--radius); padding:28px; margin-bottom:24px; box-shadow:0 2px 10px rgba(10,22,80,.04);}
  .panel h3{font-size:19px; margin-top:0; border-bottom:2px solid var(--paper-line); padding-bottom:12px; letter-spacing:.03em;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:5px; font-weight:600;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px; border:1px solid #CFC9BA; border-radius:2px; font-size:14px;
    font-family:inherit; background:#FCFBF8;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--copper-light); border-color:var(--navy-bright);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  @media(max-width:640px){.row2,.row3{grid-template-columns:1fr;}}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  table th{
    text-align:left; font-family:'Poppins',sans-serif; text-transform:uppercase; letter-spacing:.05em;
    font-size:12px; color:var(--ink-soft); border-bottom:2px solid var(--paper-line); padding:9px 8px;
  }
  table td{padding:10px 8px; border-bottom:1px solid var(--paper-line); vertical-align:middle;}
  table tr:hover td{background:#FBF8F2;}
  .status-pill{font-size:11px; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em; font-weight:600;}
  .status-pill.active{background:#E4F0E8; color:var(--ok);}
  .status-pill.revoked{background:#F3E2DD; color:var(--danger);}

  .empty{padding:40px 20px; text-align:center; color:var(--ink-soft); border:1px dashed var(--paper-line); border-radius:var(--radius); background:#fff;}
  .empty .display{font-size:15px; color:var(--ink-soft);}

  .msg{padding:11px 14px; border-radius:2px; font-size:13.5px; margin-bottom:16px; border-left:4px solid;}
  .msg.ok{background:#E7F2EB; border-color:var(--ok); color:#215038;}
  .msg.err{background:#F6E7E2; border-color:var(--danger); color:#7A2A1D;}

  /* ---------- Certificate (padrão diploma / alto padrão, azul predominante) ---------- */
  .cert-wrap{overflow-x:auto; padding:6px;}
  .certificate{
    width:1100px; min-width:1100px; aspect-ratio:1100/780; height:780px;
    position:relative; overflow:hidden;
    font-family:'Cormorant Garamond', serif;
    padding:26px;
    background:#F6F1E4;
  }
  .cert-pattern-border{
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(10,22,80,.32) 0 3px, transparent 3px 11px),
      repeating-linear-gradient(-45deg, rgba(192,133,74,.38) 0 3px, transparent 3px 11px);
  }
  .cert-inner{
    position:absolute; inset:26px; background:#FBF8F1;
    border:2px solid var(--navy-deep);
    display:flex; flex-direction:column; align-items:center;
    padding:34px 60px 28px;
  }
  .cert-inner::before{
    content:''; position:absolute; inset:7px; border:1px solid var(--copper-mid); pointer-events:none;
  }
  .cert-ribbon-diagonal{
    position:absolute; top:-10%; left:38%; width:150px; height:150%;
    background:linear-gradient(90deg, rgba(10,22,80,.05), rgba(34,56,156,.10), rgba(10,22,80,.05));
    transform:rotate(18deg); pointer-events:none; z-index:0;
  }
  .cert-header-row{
    display:flex; align-items:center; justify-content:space-between; width:100%; position:relative; z-index:2; gap:18px;
  }
  .cert-seal-official{flex-shrink:0;}
  .cert-header-text{flex:1; text-align:center;}
  .cert-header-text .inst-name{
    font-family:'Poppins',sans-serif; font-weight:700; font-size:19px; letter-spacing:.06em;
    color:var(--navy-deep); text-transform:uppercase;
  }
  .cert-header-text .inst-sub{
    font-family:'Poppins',sans-serif; font-size:10px; color:var(--ink-soft); margin-top:4px; line-height:1.5;
  }
  .cert-logo-corner{width:56px;height:56px;border-radius:10px; object-fit:contain; flex-shrink:0; box-shadow:0 2px 8px rgba(10,22,80,.2);}
  .cert-legal-body{
    font-size:15px; line-height:1.65; color:var(--ink); text-align:center; max-width:840px;
    margin:22px 0 0; position:relative; z-index:2;
  }
  .cert-legal-body strong{color:var(--navy-deep);}
  .cert-degree-line{
    font-family:'Poppins',sans-serif; font-weight:700; font-size:15px; letter-spacing:.03em;
    color:var(--navy-bright); text-align:center; margin:16px 0 2px; text-transform:uppercase; position:relative; z-index:2;
  }
  .cert-name{
    font-weight:700; font-size:42px; color:var(--navy-deep); text-align:center;
    margin:6px 0 16px; letter-spacing:.005em; position:relative; z-index:2;
    border-bottom:2.5px solid var(--navy-bright); padding-bottom:8px; display:inline-block;
  }
  .cert-detail-body{
    font-size:15px; line-height:1.6; color:var(--ink); text-align:center; max-width:820px;
    margin:0 auto; position:relative; z-index:2;
  }
  .cert-detail-body .course-name{font-weight:700; font-style:italic; color:var(--navy-bright);}
  .cert-place-date{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:15px; color:var(--ink-soft);
    text-align:center; margin:16px 0 0; position:relative; z-index:2;
  }
  .cert-signatures{
    width:100%; max-width:900px; display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:16px; margin-top:auto; padding-top:22px; position:relative; z-index:2;
  }
  .cert-sign2{text-align:center;}
  .cert-sign2 .sig-line{border-top:1.3px solid var(--navy-deep); width:170px; margin:0 auto 7px;}
  .cert-sign2 .sig-name{font-family:'Poppins',sans-serif; font-weight:600; font-size:11.5px; color:var(--navy-deep);}
  .cert-sign2 .sig-role{font-family:'Poppins',sans-serif; font-size:9.5px; color:var(--ink-soft); line-height:1.5; margin-top:2px;}
  .cert-footer-verify{
    width:100%; display:flex; align-items:center; justify-content:center; gap:14px;
    margin-top:16px; position:relative; z-index:2;
  }
  .cert-footer-verify .qrbox{background:#fff; padding:4px; border:1.5px solid var(--navy-deep); border-radius:3px; line-height:0;}
  .cert-footer-verify .verify-text{
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-soft); text-align:left; line-height:1.6;
  }
  .cert-footer-verify .verify-text strong{color:var(--navy-deep);}
  .cert-actions{display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;}

  /* ---------- Validate result ---------- */
  .valid-card{
    border:2px solid var(--ok); background:#EFF7F1; border-radius:var(--radius); padding:24px; margin-top:18px;
  }
  .invalid-card{
    border:2px solid var(--danger); background:#FBEEEA; border-radius:var(--radius); padding:24px; margin-top:18px;
  }
  .valid-card h3, .invalid-card h3{margin-top:0;}
  .kv{display:grid; grid-template-columns:180px 1fr; gap:6px 14px; font-size:14px; margin-top:12px;}
  .kv dt{color:var(--ink-soft); font-weight:600;}
  .kv dd{margin:0;}

  .modal-bg{
    position:fixed; inset:0; background:rgba(10,16,50,.6); display:flex; align-items:center; justify-content:center;
    z-index:50; padding:20px;
  }
  .modal{background:#fff; border-radius:var(--radius); max-width:720px; width:100%; max-height:88vh; overflow-y:auto; padding:28px;}
  .modal-close{float:right; background:none; border:none; font-size:22px; color:var(--ink-soft); line-height:1;}

  footer.appfoot{
    background:var(--navy-deep); color:#cfd4e8; padding:30px 24px 24px; font-size:12.5px; text-align:center;
    border-top:1px solid rgba(216,164,105,.3);
  }
  footer.appfoot a{color:var(--copper-light); text-decoration:none;}
  footer.appfoot a:hover{text-decoration:underline;}
  footer.appfoot .foot-tag{
    font-family:'Poppins',sans-serif; font-style:italic; font-size:16px; color:#fff; margin-bottom:14px;
  }
  footer.appfoot .foot-meta{opacity:.75; line-height:1.7;}
  footer.appfoot .foot-rule{width:40px; height:1px; background:var(--copper-mid); margin:16px auto; opacity:.6;}
  .login-link{background:none; border:none; color:rgba(255,255,255,.55); font-size:11px; text-decoration:underline; cursor:pointer;}

  .video-frame, .pdf-frame{width:100%; aspect-ratio:16/9; border:1px solid var(--paper-line); border-radius:2px; background:#000;}
  .pdf-frame{aspect-ratio:auto; height:70vh; background:#eee;}

  /* ---------- Course detail (layout profissional) ---------- */
  .course-hero{
    background:linear-gradient(120deg,var(--navy-deep),var(--navy-mid) 75%);
    margin:0 -28px 28px; padding:30px 28px; color:#fff;
  }
  .course-hero-inner{max-width:1200px; margin:0 auto;}
  .course-hero .eyebrow{color:var(--copper-light);}
  .course-hero h1{color:#fff; font-size:28px; margin:6px 0 8px; max-width:760px;}
  .course-hero p{color:rgba(255,255,255,.75); font-size:14px; max-width:640px; margin:0;}
  .course-layout{display:grid; grid-template-columns:1fr 300px; gap:26px; align-items:start;}
  @media(max-width:860px){.course-layout{grid-template-columns:1fr;}}
  .course-sidebar{position:sticky; top:88px; display:flex; flex-direction:column; gap:16px;}
  .side-card{background:#fff; border:1px solid var(--paper-line); border-radius:var(--radius); padding:20px; box-shadow:0 2px 10px rgba(10,22,80,.04);}
  .side-card h4{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); margin:0 0 12px; font-weight:600;}
  .side-stat{display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--paper-line); font-size:13.5px;}
  .side-stat:last-child{border-bottom:none;}
  .side-stat .lbl{color:var(--ink-soft);}
  .side-stat .val{font-weight:600; color:var(--navy-deep);}
  .instructor-card{display:flex; gap:12px; align-items:flex-start;}
  .instructor-avatar{
    width:46px;height:46px;border-radius:50%; background:linear-gradient(135deg,var(--navy-bright),var(--navy-deep));
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0;
    font-family:'Poppins',sans-serif;
  }
  .instructor-info .iname{font-weight:700; font-size:13.5px; color:var(--navy-deep);}
  .instructor-info .irole{font-size:11.5px; color:var(--ink-soft); line-height:1.5; margin-top:3px;}
  .side-cta{background:var(--copper-mid); border-radius:var(--radius); padding:20px; color:#fff;}
  .side-cta p{font-size:12.5px; color:rgba(255,255,255,.9); margin:0 0 14px; line-height:1.5;}
  .side-cta .btn{width:100%;}
  .doc-card{
    display:flex; align-items:center; gap:16px; padding:22px; border:1px solid var(--paper-line);
    border-radius:2px; background:#FBF8F2;
  }
  .doc-card .icon{
    width:52px;height:52px;border-radius:8px; background:var(--navy-deep); color:#fff; display:flex;
    align-items:center; justify-content:center; font-family:'Poppins',sans-serif; font-weight:700; font-size:12px; flex-shrink:0;
  }
  .doc-card .info{flex:1;}
  .doc-card .info .fname{font-weight:600; color:var(--navy-deep); font-size:14.5px; word-break:break-all;}
  .doc-card .info .fhint{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .upload-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .upload-row input[type=file]{flex:1; font-size:13px;}
  .upload-status{font-size:12.5px; color:var(--ink-soft); margin-top:6px;}
  .or-divider{display:flex; align-items:center; gap:10px; margin:10px 0; font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em;}
  .or-divider::before,.or-divider::after{content:''; flex:1; height:1px; background:var(--paper-line);}

  .tabs{display:flex; gap:8px; margin-bottom:22px; border-bottom:1px solid var(--paper-line); flex-wrap:wrap;}
  .tabs button{
    background:none; border:none; padding:10px 4px; margin-right:18px; font-family:'Poppins',sans-serif;
    font-weight:600; font-size:14px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft);
    border-bottom:2.5px solid transparent;
  }
  .tabs button.active{color:var(--navy-deep); border-color:var(--copper-mid);}
</style>
</head>
<body>
<div id="app" class="app"></div>

/* ============ API (Netlify Functions + Blobs) ============ */
const API_BASE = "/api";
const APP_CONFIGURED = true; // sempre "configurado": não depende de credenciais externas

async function authHeader(){
  const user = netlifyIdentity.currentUser();
  if(!user) return {};
  try{
    const token = await user.jwt();
    return { "Authorization": "Bearer " + token };
  }catch(e){ return {}; }
}
async function apiFetch(path, options={}){
  const auth = await authHeader();
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: { "Content-Type":"application/json", ...auth, ...(options.headers||{}) }
  });
  let data = null;
  try{ data = await res.json(); }catch(e){}
  if(!res.ok){ throw new Error((data && data.error) || `Erro ${res.status}`); }
  return data;
}

function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('pt-BR');
}
function fmtDateLong(iso){

  const d = new Date(iso+'T00:00:00');
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}
function genCertCode(){
  const year = new Date().getFullYear();
  const seq = String(state.certificates.length+1).padStart(4,'0');
  const rand = Math.random().toString(36).slice(2,6).toUpperCase();
  return `G3-${year}-${seq}-${rand}`;
}
function toEmbedUrl(url, type){
  if(!url) return '';
  if(type==='video'){
    let m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{11})/);
    if(m) return `https://www.youtube.com/embed/${m[1]}`;
    let v = url.match(/vimeo\.com\/(\d+)/);
    if(v) return `https://player.vimeo.com/video/${v[1]}`;
    return url;
  }
  return url;
}
function isDirectVideoFile(url){
  return /\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url||'');
}
function fileExtLabel(url){
  const m = (url||'').split('?')[0].match(/\.([a-zA-Z0-9]+)$/);
  return m ? m[1].toUpperCase() : 'ARQUIVO';
}
function typeLabel(type){
  return type==='video' ? 'Vídeo' : type==='pdf' ? 'PDF' : 'Documento';
}
function setMsg(type, text){ state.msg = {type,text}; render(); setTimeout(()=>{ state.msg=null; render(); }, 4500); }

async function submitRequest(){
  const courseSelect = document.getElementById('reqCourse');
  const courseId = courseSelect.value;
  const cpf = document.getElementById('reqCpf').value.trim();
  const completionDate = document.getElementById('reqDate').value;
  const note = document.getElementById('reqNote').value.trim();
  const course = state.courses.find(c=>c.id===courseId);
  if(!course){ setMsg('err','Selecione o curso/treinamento concluído.'); return; }
  try{
    await apiFetch('/requests', {
      method:'POST',
      body: JSON.stringify({
        cpf, note,
        courseId:course.id, courseTitle:course.title, workload:course.workload,
        completionDate: completionDate || new Date().toISOString().slice(0,10)
      })
    });
    await loadMyData();
    render();
    document.getElementById('reqResult').innerHTML = `<div class="valid-card"><h3>✅ Solicitação enviada</h3><p>Assim que a G3 AudCon confirmar sua participação no curso, o certificado digital será emitido. Você pode acompanhar o status aqui na sua área a qualquer momento.</p></div>`;
  }catch(e){
    console.error(e);
    const box = document.getElementById('reqResult');
    if(box) box.innerHTML = `<div class="invalid-card"><h3>Não foi possível enviar</h3><p>${esc(e.message||'Tente novamente em instantes.')}</p></div>`;
  }
}

async function viewMyCertificate(code){

  if(!cert) return;
  document.getElementById('myCertArea').innerHTML = renderCertificateBlock(cert);

async function doValidate(){
  const raw = document.getElementById('valCodeInput').value.trim().toUpperCase();
  const box = document.getElementById('valResult');
  if(!raw){ box.innerHTML = `<div class="invalid-card"><h3>Informe um código</h3><p>Digite o código do certificado para validar.</p></div>`; return; }
  box.innerHTML = `<p style="color:var(--ink-soft); font-size:13.5px;">Consultando…</p>`;
  let cert;
  try{
    cert = await apiFetch('/certificates?code=' + encodeURIComponent(raw));
  }catch(e){
    box.innerHTML = `<div class="invalid-card"><h3>❌ Certificado não encontrado</h3><p>Nenhum registro corresponde a este código na base da G3 AudCon. Verifique se o código foi digitado corretamente.</p></div>`;
    return;
  }
  if(cert.status==='revoked'){
    box.innerHTML = `<div class="invalid-card"><h3>⚠️ Certificado revogado</h3><p>Este certificado foi emitido, porém encontra-se <strong>revogado</strong> pela administradora e não é mais válido.</p></div>`;
    return;
  }
  box.innerHTML = `
    <div class="valid-card">
      <h3>✅ Certificado válido</h3>
      <dl class="kv">
        <dt>Participante</dt><dd>${esc(cert.studentName)}</dd>
        <dt>Curso</dt><dd>${esc(cert.courseTitle)}</dd>
        <dt>Carga horária</dt><dd>${esc(String(cert.workload))} horas</dd>
        <dt>Data de conclusão</dt><dd>${fmtDate(cert.issueDate)}</dd>
        <dt>Instrutora</dt><dd>${esc(INSTRUCTOR.nome)} (${INSTRUCTOR.crc})</dd>
        <dt>Emissor</dt><dd>${esc(COMPANY.razaoSocial)} — CNPJ ${COMPANY.cnpj}</dd>
        <dt>Código</dt><dd class="mono">${esc(cert.code)}</dd>
      </dl>
    </div>
  `;
}

/* --- Upload de material do curso (Netlify Blobs via Function) --- */
function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleCourseFileSelect(){
  const input = document.getElementById('crsFile');
  const status = document.getElementById('crsUploadStatus');
  const file = input.files && input.files[0];
  if(!file) return;
  const maxMB = 4;
  if(file.size > maxMB*1024*1024){
    status.innerHTML = `<span style="color:var(--danger);">Arquivo muito grande (${(file.size/1024/1024).toFixed(1)}MB). Limite de ${maxMB}MB nesta plataforma — para vídeos ou PDFs maiores, use um link do YouTube/Vimeo/Google Drive.</span>`;
    input.value = '';
    return;
  }
  status.textContent = `Enviando "${file.name}"… (${(file.size/1024/1024).toFixed(1)}MB)`;
  try{
    const dataBase64 = await fileToBase64(file);
    const result = await apiFetch('/upload', {
      method:'POST',
      body: JSON.stringify({ filename:file.name, contentType:file.type, dataBase64 })
    });
    document.getElementById('crsUrl').value = result.url;
    // ajusta o tipo automaticamente conforme a extensão, se possível
    const ext = file.name.split('.').pop().toLowerCase();
    const typeSelect = document.getElementById('crsType');
    if(['mp4','webm','mov','ogg'].includes(ext)) typeSelect.value = 'video';
    else if(ext==='pdf') typeSelect.value = 'pdf';
    else typeSelect.value = 'document';
    status.innerHTML = `<span style="color:var(--ok);">✓ "${esc(file.name)}" enviado com sucesso.</span>`;
  }catch(e){
    console.error(e);
    status.innerHTML = `<span style="color:var(--danger);">Falha ao enviar o arquivo: ${esc(e.message||'')}</span>`;
  }
}

function autoFillDescription(){

  const execDate = document.getElementById('crsExecDate').value;

  const areaPhrase = category

    : `na área de contabilidade, auditoria e gestão tributária`;
  const dateSentence = execDate
    ? ` Realizado em ${fmtDateLong(execDate)}.`
    : '';
  const workloadSentence = workload
    ? ` Com carga horária de ${workload} horas, `
    : ' ';

  const templates = [

function renderQR(code){
  const el = document.getElementById('qr-'+code.replace(/[^A-Z0-9]/g,''));
  if(el && window.qrcode){
    el.innerHTML='';
    const verifyUrl = `${window.location.origin}/?validar=${encodeURIComponent(code)}`;
    try{
      const qr = qrcode(0, 'M');
      qr.addData(verifyUrl);
      qr.make();
      el.innerHTML = qr.createImgTag(4, 4);
      const img = el.querySelector('img');
      if(img){ img.style.width='64px'; img.style.height='64px'; img.style.display='block'; img.alt='QR Code de validação'; }
    }catch(e){
      console.error('Erro ao gerar QR Code', e);
      el.innerHTML = `<div style="width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;text-align:center;">QR indisponível</div>`;
    }
  }
}
async function downloadCertPNG(code){
  const id = 'certRender-'+code.replace(/[^A-Z0-9]/g,'');
  const node = document.getElementById(id);
  if(!node) return;
  const canvas = await html2canvas(node, {scale:2, backgroundColor:'#FCFAF5'});
  const link = document.createElement('a');
  link.download = `Certificado_${code}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
async function downloadCertPDF(code){
  const id = 'certRender-'+code.replace(/[^A-Z0-9]/g,'');
  const node = document.getElementById(id);
  if(!node) return;
  const canvas = await html2canvas(node, {scale:2, backgroundColor:'#FCFAF5'});
  const img = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({orientation:'landscape', unit:'px', format:[canvas.width, canvas.height]});
  pdf.addImage(img, 'PNG', 0, 0, canvas.width, canvas.height);
  pdf.save(`Certificado_${code}.pdf`);
}

  const cert = state.certificates.find(c=>c.code===code);
  if(!cert) return;
  document.getElementById('certViewArea').innerHTML = renderCertificateBlock(cert);
  renderQR(cert.code);
  document.getElementById('certViewArea').scrollIntoView({behavior:'smooth'});
}
async function revokeCert(code){
  if(!confirm('Revogar este certificado? Ele deixará de ser validado como autêntico.')) return;
  const cert = state.certificates.find(c=>c.code===code);
  if(!cert) return;
  try{
    await apiFetch('/certificates', { method:'PATCH', body: JSON.stringify({code, status:'revoked'}) });
    cert.status='revoked'; setMsg('ok','Certificado revogado.'); navigate('admin');
  }catch(e){ console.error(e); setMsg('err','Não foi possível revogar o certificado.'); }
}
async function reactivateCert(code){
  const cert = state.certificates.find(c=>c.code===code);
  if(!cert) return;
  try{
    await apiFetch('/certificates', { method:'PATCH', body: JSON.stringify({code, status:'active'}) });
    cert.status='active'; setMsg('ok','Certificado reativado.'); navigate('admin');
  }catch(e){ console.error(e); setMsg('err','Não foi possível reativar o certificado.'); }
}

/* ============ BEHAVIOR / INIT ============ */
function attachViewBehavior(){
  // reservado para futuras interações pós-render
}

function isAdminUser(user){
  return !!(user && user.app_metadata && Array.isArray(user.app_metadata.roles) && user.app_metadata.roles.includes('admin'));
}

if(typeof netlifyIdentity !== 'undefined'){
  netlifyIdentity.on('login', async user => {
    netlifyIdentity.close();
    const cameFromAdminLogin = state.view === 'login';
    if(isAdminUser(user)){
      state.isAdmin = true;
      state.participant = null;
      await loadAdminData();
      navigate('admin');
    }else{
      state.isAdmin = false;
      state.participant = user;
      await loadMyData();
      navigate('account');
      if(cameFromAdminLogin){
        setMsg('err','Esta conta não tem permissão de administradora — você entrou na sua Área normal de participante.');
      }
    }
  });
  netlifyIdentity.on('logout', () => {
    state.isAdmin = false;
    state.participant = null;
    state.certificates = [];
    state.requests = [];
    state.myRequests = [];
    state.myCertificates = [];
    navigate('catalog');
  });
}

(async function init(){
  try{
    if(typeof netlifyIdentity !== 'undefined'){
      netlifyIdentity.init();
    }else{
      console.error('Netlify Identity não carregou — login ficará indisponível, mas o catálogo e a validação continuam funcionando.');
    }
  }catch(e){ console.error('Erro ao iniciar Netlify Identity', e); }

  await loadData();

  try{
    const user = typeof netlifyIdentity !== 'undefined' ? netlifyIdentity.currentUser() : null;
    if(user){
      if(isAdminUser(user)){
        state.isAdmin = true;
        await loadAdminData();
      }else{
        state.participant = user;
        await loadMyData();
      }
    }
  }catch(e){ console.error('Erro ao verificar sessão', e); }

  const urlParams = new URLSearchParams(window.location.search);
  const codeFromQR = urlParams.get('validar');
  if(codeFromQR){
    state.view = 'validate';
    render();
    const input = document.getElementById('valCodeInput');
    if(input){ input.value = codeFromQR; doValidate(); }
    return;
  }
  render();
})();
</script>
